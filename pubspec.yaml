name: orc_app
description: ORC SUSL – Outdoor Recreation Center Learning App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # UI & Utilities
  cupertino_icons: ^1.0.8
  lottie: ^3.1.2
  animated_text_kit: ^4.2.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/